version: '3.8'

services:
  # ========================================
  # Frontend (React + Vite)
  # ========================================
  web:
    build:
      context: ./web
      dockerfile: ../infra/docker/Dockerfile.web
    container_name: neuralhealer-web
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5000/api
      - VITE_AI_API_URL=http://localhost:8000
    depends_on:
      - backend
      - ai
    networks:
      - neuralhealer-network
    command: npm run dev

  # ========================================
  # Backend (Node.js + Express)
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: neuralhealer-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/neuralhealer
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key-change-in-production
      - AI_SERVICE_URL=http://ai:8000
    depends_on:
      - postgres
      - redis
    networks:
      - neuralhealer-network
    command: npm run dev

  # ========================================
  # AI Service (Python + FastAPI)
  # ========================================
  ai:
    build:
      context: ./ai
      dockerfile: ../infra/docker/Dockerfile.ai
    container_name: neuralhealer-ai
    ports:
      - "8000:8000"
    volumes:
      - ./ai:/app
      - ./ai/models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_PATH=/app/models
    networks:
      - neuralhealer-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ========================================
  # PostgreSQL Database
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: neuralhealer-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=neuralhealer
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - neuralhealer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Redis Cache
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: neuralhealer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - neuralhealer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # Nginx Reverse Proxy (Production)
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: neuralhealer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - backend
      - ai
    networks:
      - neuralhealer-network
    profiles:
      - production

# ========================================
# Volumes
# ========================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ========================================
# Networks
# ========================================
networks:
  neuralhealer-network:
    driver: bridge
